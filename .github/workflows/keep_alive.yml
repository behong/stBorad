name: Streamlit Keep Alive

on:
  schedule:
    # 12시간마다 한 번씩 실행 (UTC 기준 0시, 12시)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 직접 'Run workflow' 버튼을 눌러 테스트할 수 있게 해줍니다.

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create empty commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Keep alive: Prevent Streamlit sleep mode"
          git push
